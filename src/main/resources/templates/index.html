<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynchroMed - Portal de Pacientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e3a8a 0%, var(--bg-dark) 50%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-weight: 300;
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .grid-dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 20px;
        }

        .module-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .module-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 10px 30px -10px rgba(0, 210, 255, 0.3);
            background: rgba(30, 58, 138, 0.2);
        }

        .module-icon { font-size: 3.5rem; margin-bottom: 16px; }
        .module-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 10px; color: #f8fafc; }
        .module-desc { font-size: 1rem; color: #cbd5e1; line-height: 1.5; padding: 0 20px;}

        /* Abstract shapes */
        .shape { position: absolute; border-radius: 50%; filter: blur(80px); z-index: 1; }
        .shape-1 { width: 400px; height: 400px; background: rgba(58, 123, 213, 0.3); top: -100px; left: -100px; }
        .shape-2 { width: 500px; height: 500px; background: rgba(0, 210, 255, 0.2); bottom: -150px; right: -150px; }

        /* MODALES */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100; left: 0; top: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--bg-dark);
            margin: 5% auto;
            padding: 30px;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .close {
            color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;
        }
        .close:hover { color: #fff; }

        input, textarea {
            width: 100%; box-sizing: border-box; padding: 12px; margin-top: 8px; margin-bottom: 20px;
            border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #fff;
            font-family: inherit; font-size: 1rem;
        }
        
        input[type="date"] {
            color-scheme: dark;
        }

        button.btn-submit {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 14px 20px; width: 100%; border-radius: 8px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        button.btn-submit:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(0, 210, 255, 0.5); }
        .form-label { font-size: 0.9rem; color: #94a3b8; font-weight: 600; }
        
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .footer-link a { color: var(--primary); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <!-- VISTA PRINCIPAL (LADO CLIENTE/PACIENTE) -->
    <div class="glass-container">
        
        <h1 th:text="${tituloPlataforma}">SynchroMed</h1>
        <div class="subtitle">Portal de Pacientes - Autogestión de Salud</div>

        <div class="grid-dashboard">
            <!-- Tarjeta 1: Agenda (Única visible para el cliente) -->
            <div class="module-card" onclick="openModal('modal-agenda')">
                <div class="module-icon">📅</div>
                <div class="module-title">Agenda Médica</div>
                <div class="module-desc">Ingrese sus síntomas. Nuestro asistente detectará qué especialidad requiere y pre-registrará su cita.</div>
            </div>
        </div>

        <div class="footer-link">
            ¿Eres personal de salud? <a href="#">Acceder al Portal del Hospital</a>
        </div>
    </div>

    <!-- Modal AGENDA (Cliente) -->
    <div id="modal-agenda" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('modal-agenda')">&times;</span>
            <h2 style="margin-top:0">Reservar Cita / Consulta</h2>
            <form onsubmit="submitFormularioCliente(event)">
                <label class="form-label">Nombres y Apellidos:</label>
                <input type="text" name="nombres" required placeholder="Ej: Luis Garcia">

                <label class="form-label">DNI:</label>
                <input type="text" name="dni" required placeholder="12345678" maxlength="8" pattern="\d{8}" title="Debe contener 8 dígitos">

                <label class="form-label">Fecha de Nacimiento:</label>
                <input type="date" name="fechaNacimiento" required>

                <label class="form-label">Detalle sus Síntomas Principales:</label>
                <textarea name="sintomas" rows="4" required placeholder="Siento dolor en el pecho, fiebre, tos..."></textarea>

                <button type="submit" class="btn-submit">Enviar Solicitud a SynchroMed</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Cerrar al hacer clic en el cristal (fuera de la caja)
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = "none";
            }
        }

        async function submitFormularioCliente(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Evaluando Síntomas...';
            btn.disabled = true;

            try {
                const params = new URLSearchParams(new FormData(e.target));
                const response = await fetch('/api/paciente/agendar', { method: 'POST', body: params });
                const text = await response.text();
                
                let iconType = 'success';
                let alertColor = '#3b82f6';
                
                // Efecto visual según gravedad de la inferencia del bot
                if (text.includes('EMERGENCIA')) {
                    iconType = 'error'; 
                    alertColor = '#ef4444';
                } else if (text.includes('TRAUMATOLOGÍA') || text.includes('INFECTOLOGÍA')) {
                    iconType = 'warning';
                    alertColor = '#f59e0b';
                }

                Swal.fire({
                    title: 'Resultado del Agente:',
                    text: text,
                    icon: iconType,
                    background: '#1e293b', 
                    color: '#fff',
                    confirmButtonColor: alertColor
                });
                
                closeModal('modal-agenda');
                e.target.reset();
            } catch (error) {
                Swal.fire('Error', 'No se pudo contactar al servidor', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
